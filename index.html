<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Império da Pizza ULTRA</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<header>
  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/6978/6978255.png">
    <h1>Império da Pizza</h1>
  </div>

  <nav id="menu">
    <a href="#cardapio">Cardápio</a>
    <a href="#carrinho">Carrinho</a>
    <a href="#checkout">Checkout</a>
    <a href="#admin">Pedidos</a>
  </nav>

  <div class="mobile" onclick="toggleMenu()">☰</div>
</header>

<section class="banner">
  <h2>O Sabor que Domina a Cidade 🍕🔥</h2>
  <button onclick="scrollCardapio()">Fazer Pedido</button>
</section>

<section id="cardapio">
  <h2>Cardápio</h2>

  <input type="text" id="busca" placeholder="Buscar produto..." onkeyup="buscar()">

  <div class="filtros">
    <button onclick="filtrar('todos')">Todos</button>
    <button onclick="filtrar('pizza')">Pizzas</button>
    <button onclick="filtrar('burger')">Hambúrguer</button>
    <button onclick="filtrar('lanche')">Lanches</button>
    <button onclick="filtrar('porcao')">Porções</button>
    <button onclick="filtrar('bebida')">Bebidas</button>
  </div>

  <div id="produtos" class="grid"></div>
</section>

<section id="carrinho">
  <h2>🛒 Carrinho</h2>
  <div id="itens"></div>
  <h3>Total: R$ <span id="total">0.00</span></h3>
</section>

<section id="checkout">
  <h2>Finalizar Pedido</h2>

  <input type="text" id="nome" placeholder="Nome">
  <input type="text" id="endereco" placeholder="Endereço">
  <input type="text" id="bairro" placeholder="Bairro">

  <select id="pagamento" onchange="mostrarPix()">
    <option>Dinheiro</option>
    <option>Pix</option>
    <option>Cartão</option>
  </select>

  <div id="pix-area" style="display:none;">
    <h3>QR Code Pix</h3>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=PixImperioPizza">
  </div>

  <textarea id="obs" placeholder="Observação"></textarea>

  <button onclick="finalizar()">Finalizar Pedido</button>
  <button onclick="enviarWhats()">Enviar para WhatsApp</button>

  <div id="msg"></div>
</section>

<section id="admin">
  <h2>📦 Painel de Pedidos</h2>
  <div id="lista-pedidos"></div>
</section>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
